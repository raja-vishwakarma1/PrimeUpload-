<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <i class="fas fa-rocket"></i>
                <span>PrimeUpload</span>
            </div>
            <nav class="nav">
                <a href="index.html" class="nav-item">
                    <i class="fas fa-upload"></i>
                    <span>Upload</span>
                </a>
                <a href="details.html" class="nav-item active">
                    <i class="fas fa-eye"></i>
                    <span>Preview</span>
                </a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <header class="header">
                <h1 class="page-title">
                    <i class="fas fa-eye"></i>
                    Latest Preview
                </h1>
                <button class="btn-primary" onclick="clearAllData()">
                    <i class="fas fa-trash-alt"></i> Clear All
                </button>
            </header>

            <div class="content">
                <div class="loading-screen" id="loadingScreen">
                    <div class="loading-spinner">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Loading your latest upload...</p>
                    </div>
                </div>

                <div class="preview-grid hidden" id="previewGrid">
                    <!-- Dynamic content loaded by JS -->
                </div>

                <div class="empty-state hidden" id="emptyState">
                    <div class="empty-icon">
                        <i class="fas fa-cloud-upload-alt"></i>
                    </div>
                    <h3>No uploads yet</h3>
                    <p>Upload your first file to see preview here</p>
                    <a href="index.html" class="btn-primary">Start Upload</a>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script src="script.js"></script>
</body>
</html>
